<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudX — Carbon Zapp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@200;300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: "Gunterz"; src: url("assets/fonts/Gunterz.woff2") format("woff2"); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black:#0a0908; --white:#f5f3ef; --accent:#ED1C24; }
    body { background: var(--black); color: var(--white); font-family: "Public Sans", sans-serif; min-height: 100vh; }
    .page-placeholder { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
    .page-placeholder-inner { text-align: center; }
    .page-placeholder-eyebrow { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,243,239,0.25); margin-bottom: 16px; }
    .page-placeholder-title { font-family: "Gunterz", sans-serif; font-size: 48px; line-height: 1; color: var(--white); }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="page-placeholder">
  <div class="page-placeholder-inner">
    <div class="page-placeholder-eyebrow">Coming Soon</div>
    <div class="page-placeholder-title">CloudX</div>
  </div>
</div>

<div id="footer-cta-placeholder"></div>
<div id="footer-placeholder"></div>

<script src="components.js"></script>
</body>
</html>
