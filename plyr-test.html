<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Plyr Test — Carbon Zapp</title>
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #f5f5f5; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
  .wrap { width: 100%; max-width: 960px; }

  /* ── Plyr custom theme ── */
  .plyr {
    --plyr-color-main: #ED1C24;
    --plyr-video-background: #000;
    --plyr-control-radius: 2px;
    --plyr-font-family: 'Public Sans', sans-serif;
    --plyr-control-icon-size: 16px;
    --plyr-control-spacing: 10px;
    border-radius: 4px;
    overflow: hidden;
  }

  /* Hide YouTube logo / branding overlay */
  .plyr__poster { background-size: cover; }
</style>
</head>
<body>
<div class="wrap">
  <div id="player" data-plyr-provider="youtube" data-plyr-embed-id="71cRZgBapU0"></div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
  const player = new Plyr('#player', {
    youtube: {
      noCookie: true,
      rel: 0,
      showinfo: 0,
      iv_load_policy: 3,
      modestbranding: 1
    },
    controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'fullscreen'],
    hideControls: true,
    resetOnEnd: true,
  });
</script>
</body>
</html>
